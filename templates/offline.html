<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Offline Page — Recipe Recommendation App">
    <title>Offline — Recipe App</title>

    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0d6efd">

    <script>
        if ( "serviceWorker" in navigator )
        {
            navigator.serviceWorker.register( "/service-worker.js" )
                .then( reg => console.log( "Service Worker registered:", reg ) )
                .catch( err => console.log( "Service Worker failed:", err ) );
        }
    </script>

    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/style.css') }}">
</head>

<body>
    <!-- NAVBAR -->
    <nav class="topnav" id="myTopnav">
        <div class="nav-top-row">
            <div class="logo">Recipe App</div>
        </div>
        <div class="nav-links">
            <a href="{{ url_for('home') }}">HOME</a>
            <a href="{{ url_for('about') }}">ABOUT</a>
        </div>
    </nav>

    <!-- HERO -->
    <section class="hero" id="heroSection">
        <div class="hero-inner">
            <div class="hero-badge">Recipe Recommendation App</div>
            <h1 class="hero-title">
                You Are<br>
                Currently<br>
                <em>Offline</em>
            </h1>
        </div>
    </section>

    <!-- Pesan Offline -->
    <section class="menu-panel">
        <div class="menu-grid">
            <div class="menu-category">
                <h3>Oops!</h3>
                <div class="menu-row">
                    <span class="dish-name">Status</span>
                    <span class="dish-price">Tidak ada koneksi internet</span>
                </div>
                <div class="menu-row">
                    <span class="dish-name">Tips</span>
                    <span class="dish-price">Coba periksa jaringan atau buka kembali saat online</span>
                </div>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer" style="background-color:#888; padding:20px 14px; margin-top:auto;">
        <p style="font-size:12px; color:#333; line-height:1.6;">
            &copy; <span id="year"></span> by Fitria Melliyanni. All rights reserved. <br>
            Developed by
            <a href="https://github.com/mefitria30" target="_blank"
                style="font-weight:bold; color:#000; text-decoration:none;">mefitria30</a> •
            Distributed by
            <a href="https://themewagon.com" target="_blank"
                style="font-weight:bold; color:#000; text-decoration:none;">ThemeWagon</a>
        </p>
    </footer>

    <script>
        document.getElementById( "year" ).textContent = new Date().getFullYear();
    </script>
</body>

</html>
