<body>

    <!-- ══════════════════════════════════════
       NAVBAR — Logo center-top, links row below
       ══════════════════════════════════════ -->
    <nav class="topnav" id="myTopnav">

        <!-- Row 1: Logo (center) + hamburger (right on mobile) -->
        <div class="nav-top-row">
            <div class="logo">SPICE HAVEN</div>
            <button class="nav-hamburger" id="navHamburger" aria-label="Toggle menu">&#9776;</button>
        </div>

        <!-- Row 2: Navigation links -->
        <div class="nav-links" id="navLinks">
            <a href="{{ url_for('home') }}" class="active">HOME</a>
            <a href="{{ url_for('about') }}">ABOUT</a>
        </div>

    </nav>

    <!-- ══════════════════════════════════════
       HERO — Fully rebuilt with rich content
       ══════════════════════════════════════ -->
    <section class="hero" id="heroSection">
        <div class="hero-inner">

            <div class="hero-badge">Recipe Recommendation App</div>

            <h1 class="hero-title">
                Find<br>
                Your<br>
                <em>Recipe</em>
            </h1>
        </div>

        <!-- Scroll indicator -->
        <div class="hero-scroll-hint">
            <span>SCROLL</span>
            <div class="scroll-line"></div>
        </div>
    </section>

    <div class="booking-controls">
        <div class="booking-field">
            <label for="namaResep">Masukkan Nama Resep</label>
            <input id="namaResep" type="text" list="resepList" placeholder="Contoh: ayam goreng, sup tahu kimchi">
            <datalist id="resepList"></datalist>
        </div>
    </div>
    <button class="book-btn" onclick="cariResep()">SEARCH RECIPE</button>


    <!-- Tempat hasil rekomendasi -->
    <section class="menu-panel">
        <div class="menu-images-row">
            <div class="img-box"><img src="https://img-global.cpcdn.com/recipes/d3b3972bd92ed18f/680x781f0.5_0.577343_1.0q80/sambal-goreng-kentang-ati-ampela-foto-resep-utama.webp" alt="Dish"></div>
        </div>

        <div class="menu-grid" id="hasil">
            
        </div>
    </section>

    
    <section class="menu-panel">
        <div class="menu-grid" id="hasil"></div>
    </section>

    <!-- ══════════════════════════════════════
       FOOTER
       ══════════════════════════════════════ -->
    <footer class="footer" style="background-color:#888; padding:20px 14px; margin-top:auto;">
        <p style="font-size:12px; color:#333; line-height:1.6;">
            &copy; <span id="year"></span> by Fitria Melliyanni. All rights reserved. <br>
            Developed by
            <a href="https://github.com/mefitria30" target="_blank"
                style="font-weight:bold; color:#000; text-decoration:none;">mefitria30</a> •
            Distributed by
            <a href="https://themewagon.com" target="_blank"
                style="font-weight:bold; color:#000; text-decoration:none;">ThemeWagon</a>
        </p>
    </footer>

    <script src="{{ url_for('static', filename='assets/js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='assets/js/script.js') }}"></script>

    <script>
        // Script untuk bikin tahun otomatis sesuai tahun sekarang
        document.getElementById( "year" ).textContent = new Date().getFullYear();
    </script>

    <script>
        async function loadAutocomplete ()
        {
            try
            {
                const res = await fetch( "https://recipe-content-based.onrender.com/recipes" );
                const names = await res.json();
                const datalist = document.getElementById( "resepList" );
                datalist.innerHTML = "";
                names.forEach( n =>
                {
                    datalist.innerHTML += `<option value="${ n }">`;
                } );
            } catch ( err )
            {
                console.error( "Gagal load daftar resep:", err );
            }
        }
        window.onload = loadAutocomplete;
    </script>


</body>

</html>
